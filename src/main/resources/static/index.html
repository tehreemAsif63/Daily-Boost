<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
  </head>
  <body>
    <h1>Welcome to InspireMe!</h1>
    <main>
        <div class="message">Click the Button For Motivation!</div>
        <button onclick="getMotivation()">Let's Go</button>
    </main>


    <script>
        function getMotivation() {
            fetch("/motivation")
                .then(response => response.text())
                .then(msg => document.getElementById("message").innerText = msg);
        }
    </script>
  </body>
</html>
